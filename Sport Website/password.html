<html>
<head>
	<title>Login</title>
    <style>
	h1 {
		text-align:center;
		color:BlueViolet;
		font-family:Trebuchet MS;
	}
	body {
		background-image: url(sport.jpg);
		background-repeat: no-repeat;
		background-size: cover;
	}
	input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
	input[type=submit] {
        background-color: #04AA6D;
        color: white;
        margin-bottom: 10px;
    }
	input[type=reset] {
        background-color: FireBrick;
        color: white;
        margin-bottom: 10px;
    }
    .login {
        background-color: #f1f1f1;
        border: 1px solid gray;
        border-radius: 4px;
        padding: 20px;
        margin: auto;
        width: 35%;
		height:40%;
        position: relative;
    }
	</style>
</head>

<body>
	<h1>Login</h1>
	<div class="login">
        <form onSubmit="return validForm(this)" action="FounderPage.html" target="main">
            <br/>Input the password:
			<br/><input type="PASSWORD" name="password">
            <p><input type="SUBMIT" value="Submit">
			<input type="RESET" value="reset"></p>
        </form>
    </div>
	
	<script>
	function validForm(passForm) {
			if (passForm.password.value == "") {
				alert("You must enter a password!")
				passForm.password.focus()
				return false
			}
			if (passForm.password.value != "JavaScript") {
				alert("Wrong Password!")
				passForm.password.focus()
				passForm.password.select()
				return false
			}
			return true
		}
	</script>	
</body>
</html>
